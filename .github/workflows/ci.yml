name: .NET CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-test:
    runs-on: windows-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup NuGet
      uses: nuget/setup-nuget@v2

    - name: Restore dependencies
      run: nuget restore code/ledger.sln

    - name: Build
      run: dotnet build code/ledger.sln --configuration Release --no-restore

    - name: Run tests
      run: dotnet test code/ledger.Tests/ledger.Tests.csproj --configuration Release --no-build --verbosity normal