name: .NET CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-test:
    runs-on: windows-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '6.0.x'

    - name: Restore dependencies
      run: dotnet restore code/ledger.sln

    - name: Build
      run: dotnet build code/ledger.sln --configuration Release --no-restore

    - name: Run tests
      run: dotnet test code/ledger.Tests/ledger.Tests.csproj --configuration Release --no-build --verbosity normal