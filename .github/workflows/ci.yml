name: .NET CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-test:
    runs-on: windows-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    # 设置 NuGet
    - name: Setup NuGet
      uses: nuget/setup-nuget@v2

    # 关键点：在 code 目录下 restore
    - name: Restore NuGet packages
      working-directory: code
      run: nuget restore ledger.sln

    # 使用 VS 自带 MSBuild（而不是 dotnet build）
    - name: Build solution
      working-directory: code
      run: |
        msbuild ledger.sln ^
          /p:Configuration=Release ^
          /p:RestorePackages=false

    # 运行测试（适用于 .NET Framework）
    - name: Run tests
      working-directory: code
      run: |
        vstest.console.exe ledger.Tests\bin\Release\ledger.Tests.dll
